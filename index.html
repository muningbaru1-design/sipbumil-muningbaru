<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SiMUNBAR - Pelayanan Desa</title>

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#0b0b0b;
    color:white;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    padding:15px 30px;
    background:#111;
}
.logo-box img{height:60px}

/* JAM */
.clock-time{font-size:26px;color:#00ffd5}
.clock-date{font-size:14px}

/* HERO */
.hero-wrap{
    position:relative;
    max-width:1200px;
    margin:auto;
}
.hero-img{
    width:100%;
    display:block;
}

/* HOTSPOT */
.icon-area{
    position:absolute;
    cursor:pointer;
    border-radius:28px;
    transform:translate(-50%, -50%);
}

/* POSISI UTAMA */
.tamu{ top:64%; left:21%; width:22%; height:26%; }
.surat{ top:64%; left:50%; width:22%; height:26%; }
.aduan{ top:64%; left:79%; width:22%; height:26%; }

/* BERITA DESA (SUPER PRESISI AREA GEDUNG) */
.berita{
    top:25%;
    left:87%;
    width:13%;
    height:17%;
}

/* LABEL BERITA */
.berita::after{
    content:"📰 BERITA DESA";
    position:absolute;
    bottom:8px;
    left:50%;
    transform:translateX(-50%);
    font-size:13px;
    font-weight:bold;
    color:#00ffd5;
    text-shadow:0 0 8px rgba(0,255,213,0.8);
}

/* GLOW */
.icon-area::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:28px;
    background:rgba(0,255,213,0.10);
    box-shadow:
        0 0 12px rgba(0,255,213,0.35),
        0 0 22px rgba(0,255,213,0.15);
    opacity:0.6;
    transition:0.3s;
}
.icon-area:hover::before{
    box-shadow:
        0 0 20px rgba(0,255,213,0.6),
        0 0 35px rgba(0,255,213,0.25);
    opacity:1;
}
.icon-area:active{
    transform:translate(-50%, -50%) scale(0.97);
}

/* CEK STATUS */
.cek-status{
    text-align:center;
    padding:20px;
}
.cek-status input{
    padding:10px;
    width:260px;
    border-radius:8px;
    border:none;
}
.cek-status button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#00ffd5;
    cursor:pointer;
    font-weight:bold;
}
#hasilStatus{
    margin-top:10px;
    font-weight:bold;
}

/* MARQUEE */
.marquee{
    background:#111;
    padding:10px;
    text-align:center;
    color:#00ffd5;
}

/* MENU */
.menu{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:30px;
}
.card{
    width:300px;
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}
.card:hover{transform:scale(1.05)}
.card img{width:100%}
.card h3{text-align:center;padding:15px}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
}
.modal iframe{
    width:90%;
    height:90%;
    margin:3% auto;
    display:block;
}
.close{
    position:absolute;
    right:20px;
    top:10px;
    font-size:30px;
    cursor:pointer;
}

.footer{
    text-align:center;
    padding:20px;
    background:#111;
}
</style>
</head>

<body>

<div class="navbar">
<div class="logo-box">
<img src="https://muningbaru1-design.github.io/pelayanan-desa/logo-simunbar.png">
</div>
<div>
<div class="clock-time" id="jam"></div>
<div class="clock-date" id="tanggal"></div>

<button onclick="openAdmin()" style="
margin-top:5px;
padding:5px 10px;
border:none;
border-radius:6px;
background:#00ffd5;
font-weight:bold;
cursor:pointer;">
Admin
</button>

</div>
</div>

<!-- HERO -->
<div class="hero-wrap">
<img src="template-pelayanan.png" class="hero-img">

<div class="icon-area tamu" onclick="openModal('https://forms.gle/8ipvJkeh76VHPsAW8')"></div>
<div class="icon-area surat" onclick="openModal('https://docs.google.com/forms/d/e/1FAIpQLScJu578Dd6od4C4VFW0JGOAGXkk9lDIgeb5TDE0qj6FBRWgNQ/viewform')"></div>
<div class="icon-area aduan" onclick="openModal('https://forms.gle/o864Q2Jdh42QEXRB7')"></div>

<!-- BERITA -->
<div class="icon-area berita" onclick="openBerita()"></div>

</div>

<div class="cek-status">
<input type="text" id="cari" placeholder="Masukkan Nama / NIK">
<button onclick="cekStatus()">Cek Status Surat</button>
<div id="hasilStatus"></div>
</div>

<div class="marquee">
<marquee>SELAMAT DATANG DI PELAYANAN DESA MUNING BARU</marquee>
</div>

<div class="menu">
<div class="card" onclick="openModal('https://forms.gle/8ipvJkeh76VHPsAW8')">
<img src="template-pelayanan.png">
<h3>Buku Tamu 🔵 <span id="notifTamu">0</span></h3>
</div>

<div class="card" onclick="openModal('https://docs.google.com/forms/d/e/1FAIpQLScJu578Dd6od4C4VFW0JGOAGXkk9lDIgeb5TDE0qj6FBRWgNQ/viewform')">
<img src="template-pelayanan.png">
<h3>Pelayanan Surat 🔴 <span id="notifSurat">0</span></h3>
</div>

<div class="card" onclick="openModal('https://forms.gle/o864Q2Jdh42QEXRB7')">
<img src="template-pelayanan.png">
<h3>Aduan 🔴 <span id="notifAduan">0</span></h3>
</div>
</div>

<div id="modal" class="modal">
<span class="close" onclick="closeModal()">✖</span>
<iframe id="frame"></iframe>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:9999;">
<div style="background:#111;width:300px;padding:20px;border-radius:12px;text-align:center;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);">
<h3>Login Admin</h3>
<input type="password" id="adminPin" placeholder="Masukkan PIN" style="width:100%;padding:10px;border-radius:8px;border:none;">
<button onclick="cekLogin()" style="margin-top:10px;width:100%;padding:10px;border:none;border-radius:8px;background:#00ffd5;font-weight:bold;">Masuk</button>
<div id="menuAdmin" style="display:none;margin-top:10px;">
<button onclick="goAdmin(1)" style="width:100%;margin-top:5px;">Buku Tamu</button>
<button onclick="goAdmin(2)" style="width:100%;margin-top:5px;">Surat</button>
<button onclick="goAdmin(3)" style="width:100%;margin-top:5px;">Aduan</button>
<button onclick="goAdmin(4)" style="width:100%;margin-top:5px;">Semua Data</button>
</div>
<div onclick="closeAdmin()" style="margin-top:10px;cursor:pointer;">Tutup</div>
</div>
</div>

<div class="footer">© 2026 Desa Muning Baru</div>

<script>

/* JAM */
function updateJam(){
const now=new Date();
document.getElementById("jam").innerText=now.toLocaleTimeString('id-ID');
document.getElementById("tanggal").innerText=
now.toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
}
setInterval(updateJam,1000);

/* MODAL */
function openModal(link){
document.getElementById("modal").style.display="block";
document.getElementById("frame").src=link;
}
function closeModal(){
document.getElementById("modal").style.display="none";
}

/* BERITA */
function openBerita(){
window.open("http://muningbaru1.blogspot.com/?m=1","_blank");
}

/* CEK STATUS */
async function cekStatus(){
const keyword=document.getElementById("cari").value.toLowerCase();

const data=await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSNSqZmr8mhDwdRlNFZUvnKE9MRyT5zFKi4YiNXWukqp6zZuoCRoluLdBtgMBpJEZ84xI0Oc9cuo4Io/pub?gid=595147775&single=true&output=csv")
.then(r=>r.text());

const rows=data.split("\n");
let hasil="Data tidak ditemukan";

for(let i=1;i<rows.length;i++){
if(rows[i].toLowerCase().includes(keyword)){
hasil="Status: "+rows[i];
break;
}
}
document.getElementById("hasilStatus").innerText=hasil;
}

/* ADMIN */
function openAdmin(){
document.getElementById("adminPanel").style.display="block";
}
function closeAdmin(){
document.getElementById("adminPanel").style.display="none";
}
function cekLogin(){
if(document.getElementById("adminPin").value==="12345"){
document.getElementById("menuAdmin").style.display="block";
}else{
alert("PIN salah!");
}
}
function goAdmin(x){
if(x==1) window.open("https://docs.google.com/spreadsheets/d/1wXSSNQZdIGYdBOCNST6ec9P7QkmGC0XlsKqNHWF4zkA/edit","_blank");
if(x==2) window.open("https://docs.google.com/spreadsheets/d/1GimNzY0IiloawXkKdhJsxmI4Z_LpoFJCgYj0icam5TU/edit","_blank");
if(x==3) window.open("https://docs.google.com/spreadsheets/d/1CSXWRzMxMTvWwyNid3pod8KEgSYJiwhi2BS_bPvY6nc/edit","_blank");
if(x==4) window.open("https://drive.google.com/drive/my-drive","_blank");
}

/* NOTIF */
async function ambilData(){
const [tamu,surat,aduan]=await Promise.all([
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vTf0YY597JgnBlEeoq375PxbGMzpq0Eum3qF57iU-HvAG0GviT8x7Feh6pvwm16bVfbtGRVWiHTtln5/pub?gid=53317010&single=true&output=csv").then(r=>r.text()),
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSNSqZmr8mhDwdRlNFZUvnKE9MRyT5zFKi4YiNXWukqp6zZuoCRoluLdBtgMBpJEZ84xI0Oc9cuo4Io/pub?gid=595147775&single=true&output=csv").then(r=>r.text()),
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vR_5xLKXz0SzzQgs-CTw7M3A5hiVZ2UyttODKK-vPFVvHup81fE_wLus-FWCXygXVxJ2te9Ni5FqSoD/pub?gid=1837680240&single=true&output=csv").then(r=>r.text())
]);

document.getElementById("notifTamu").innerText=tamu.split("\n").length-1;
document.getElementById("notifSurat").innerText=surat.split("\n").length-1;
document.getElementById("notifAduan").innerText=aduan.split("\n").length-1;
}
ambilData();

</script>

</body>
</html>
