<!DOCTYPE html> 
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIP BUMIL - Desa Muning Baru</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
background:#050505;
color:white;
overflow-x:hidden;
}

/* HEADER */
.header{
width:100%;
padding:20px 30px;
display:flex;
justify-content:space-between;
align-items:center;
background:#0b0b0b;
border-bottom:1px solid rgba(0,255,255,0.15);
position:sticky;
top:0;
z-index:1000;
}

.logo{display:flex;align-items:center;gap:15px;}

.logo-circle{
width:55px;height:55px;border-radius:50%;
background:linear-gradient(135deg,#00ffd5,#00a2ff);
display:flex;align-items:center;justify-content:center;font-size:26px;
box-shadow:0 0 20px rgba(0,255,213,0.5);
}

.logo-text h1{font-size:24px;color:#00ffd5;}
.logo-text p{font-size:12px;color:#aaa;}

.header-btn{
padding:10px 18px;background:#00ffd5;border:none;border-radius:10px;
font-weight:bold;cursor:pointer;transition:0.3s;
}

.header-btn:hover{transform:scale(1.05);}

/* HERO */
.hero{
padding:70px 30px;
max-width:1300px;
margin:auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:50px;
align-items:center;
}

.hero h2{
font-size:58px;
line-height:1.1;
margin-bottom:20px;
}

.hero h2 span{color:#00ffd5;}

.hero p{
color:#aaa;
line-height:1.8;
font-size:18px;
margin-bottom:30px;
}

.hero-buttons{
display:flex;
gap:15px;
flex-wrap:wrap;
}

/* TAMBAHAN SEARCH (TIDAK MERUBAH DESAIN) */
.search-box{
margin-top:20px;
}

.search-box input{
padding:12px;
width:260px;
border-radius:10px;
border:none;
}

.search-box button{
padding:12px;
border:none;
border-radius:10px;
background:#00ffd5;
font-weight:bold;
cursor:pointer;
margin-left:5px;
}

.hasil{
margin-top:15px;
background:#111;
padding:20px;
border-radius:15px;
max-width:500px;
}

/* BUTTON */
.btn-primary{
padding:14px 24px;
background:#00ffd5;
border:none;
border-radius:14px;
font-weight:bold;
cursor:pointer;
font-size:15px;
}

.btn-outline{
padding:14px 24px;
border:1px solid #00ffd5;
background:transparent;
color:#00ffd5;
border-radius:14px;
font-weight:bold;
cursor:pointer;
}

/* DASHBOARD */
.dashboard{
background:#111;
border-radius:30px;
padding:30px;
border:1px solid rgba(0,255,213,0.15);
}

.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.stat-box{
background:#191919;
padding:25px;
border-radius:20px;
}

.stat-box h3{
font-size:38px;
color:#00ffd5;
margin-top:10px;
}

/* MENU */
.menu-section{
max-width:1300px;
margin:auto;
padding:30px;
}

.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.menu-card{
background:#111;
padding:30px;
border-radius:28px;
}

.menu-card button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:#00ffd5;
}

/* FOOTER */
.footer{
margin-top:60px;
padding:30px;
text-align:center;
background:#0b0b0b;
}

/* RESPONSIVE */
@media(max-width:900px){
.hero{grid-template-columns:1fr;}
.hero h2{font-size:42px;}
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="logo">
<div class="logo-circle">🤰</div>
<div class="logo-text">
<h1>SIP BUMIL</h1>
<p>Sistem Informasi Persiapan Ibu Hamil dan Bayinya</p>
</div>
</div>
<button class="header-btn">Login Admin</button>
</div>

<!-- HERO -->
<section class="hero">

<!-- KIRI -->
<div>

<h2>Monitoring <span>Ibu Hamil</span> dan Bayi Desa</h2>

<p>
Platform digital kesehatan desa untuk pendataan ibu hamil,
pemantauan bayi, jadwal posyandu, monitoring stunting.
</p>

<div class="hero-buttons">
<button class="btn-primary"
onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSeNF72miW4m7Y4iRNvPY21pOj8SvDLtIqDbdBD60cylcL_AnQ/viewform','_blank')">
Input Data Bumil
</button>

<button class="btn-outline">Dashboard Posyandu</button>
</div>

<!-- 🔍 FITUR CARI (DITAMBAHKAN DI SINI) -->
<div class="search-box">
<input type="text" id="cariNama" placeholder="Ketik Nama / NIK">
<button onclick="cariData()">Cari</button>

<div id="hasilCari" class="hasil"></div>
</div>

</div>

<!-- KANAN DASHBOARD -->
<div class="dashboard">
<div class="stats">
<div class="stat-box"><h3>128</h3><p>Ibu Hamil</p></div>
<div class="stat-box"><h3>94</h3><p>Bayi</p></div>
<div class="stat-box"><h3>12</h3><p>Posyandu</p></div>
<div class="stat-box"><h3 style="color:red;">5</h3><p>Risiko</p></div>
</div>
</div>

</section>

<!-- FOOTER -->
<div class="footer">
© 2026 Desa Muning Baru
</div>

<script>

async function cariData(){

const keyword = document.getElementById("cariNama").value.toLowerCase();

const data = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSEiMvSlcQpexG-W6N00NC7FLNIZTSJTVJ2Dgac4J8a0-AXaUN5Sb_2kQLRgRYjgsnV5cAq_ApHpOeg/pub?gid=580499086&single=true&output=csv")
.then(r => r.text());

const rows = data.split("\n");

let hasil = "<div style='color:red'>Data tidak ditemukan</div>";

for(let i=1;i<rows.length;i++){

let kolom = rows[i].split(",");

let nama = kolom[1] || "";
let nik  = kolom[6] || "";
let linkPDF = kolom[30] || "";

if(
nama.toLowerCase().includes(keyword) ||
nik.toLowerCase().includes(keyword)
){

let embed = linkPDF.replace("/view","/preview");

hasil = `
<h3 style="color:#00ffd5">🤰 ${nama}</h3>
<p><b>NIK:</b> ${nik}</p>

<iframe src="${embed}" width="100%" height="350"
style="border:none;border-radius:10px;"></iframe>
`;

break;
}
}

document.getElementById("hasilCari").innerHTML = hasil;

}

</script>

</body>
</html>
