<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SIP BUMILNYA - Desa Muning Baru</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#050505;color:white;}

/* HEADER */
.header{
padding:20px 30px;
display:flex;
justify-content:space-between;
background:#0b0b0b;
border-bottom:1px solid rgba(0,255,255,0.15);
}

.logo{display:flex;align-items:center;gap:15px;}
.logo-circle{
width:55px;height:55px;border-radius:50%;
background:linear-gradient(135deg,#00ffd5,#00a2ff);
display:flex;align-items:center;justify-content:center;font-size:26px;
}

.logo-text h1{font-size:22px;color:#00ffd5;}
.header-btn{
padding:10px 18px;background:#00ffd5;border:none;border-radius:10px;font-weight:bold;cursor:pointer;
}

/* HERO */
.hero{
padding:50px 30px;
max-width:1200px;
margin:auto;
text-align:center;
}

.hero h2{font-size:42px;margin-bottom:10px;}
.hero span{color:#00ffd5;}

.search-box{
margin-top:25px;
}

.search-box input{
width:260px;
padding:12px;
border-radius:10px;
border:none;
margin-right:5px;
}

.search-box button{
padding:12px 16px;
border:none;
border-radius:10px;
background:#00ffd5;
font-weight:bold;
cursor:pointer;
}

/* HASIL */
.hasil{
margin-top:25px;
background:#111;
padding:20px;
border-radius:20px;
max-width:600px;
margin-left:auto;
margin-right:auto;
}

/* MENU */
.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:30px;
max-width:1200px;
margin:auto;
}

.card{
background:#111;
padding:20px;
border-radius:20px;
text-align:center;
}

.card button{
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
background:#00ffd5;
cursor:pointer;
}

.footer{
text-align:center;
padding:20px;
background:#0b0b0b;
margin-top:40px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="logo">
<div class="logo-circle">🤰</div>
<div class="logo-text">
<h1>SIP BUMILNYA</h1>
<p>Sistem Ibu Hamil Desa</p>
</div>
</div>
<button class="header-btn">Admin</button>
</div>

<!-- HERO + SEARCH -->
<div class="hero">

<h2>Monitoring <span>Ibu Hamil</span></h2>
<p>Cari data ibu hamil dan tampilkan stiker P4K</p>

<div class="search-box">
<input type="text" id="cariNama" placeholder="Ketik Nama / NIK">
<button onclick="cariData()">Cari</button>
</div>

<div id="hasilCari" class="hasil">
Silakan cari nama atau NIK
</div>

</div>

<!-- MENU -->
<div class="menu">

<div class="card">
<h3>Input Data</h3>
<button onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSeNF72miW4m7Y4iRNvPY21pOj8SvDLtIqDbdBD60cylcL_AnQ/viewform')">
Buka
</button>
</div>

<div class="card">
<h3>Data Bumil</h3>
<button>Buka</button>
</div>

<div class="card">
<h3>Posyandu</h3>
<button>Buka</button>
</div>

</div>

<!-- FOOTER -->
<div class="footer">
© 2026 Desa Muning Baru
</div>

<script>

async function cariData(){

const keyword = document.getElementById("cariNama").value.toLowerCase();

const data = await fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vSEiMvSlcQpexG-W6N00NC7FLNIZTSJTVJ2Dgac4J8a0-AXaUN5Sb_2kQLRgRYjgsnV5cAq_ApHpOeg/pub?gid=580499086&single=true&output=csv")
.then(r => r.text());

const rows = data.split("\n");

let hasil = "<div style='color:red'>Data tidak ditemukan</div>";

for(let i=1;i<rows.length;i++){

let kolom = rows[i].split(",");

// SESUAI DATA KAMU
let nama = kolom[1] || "";
let nik  = kolom[6] || "";
let linkPDF = kolom[30] || "";

if(
nama.toLowerCase().includes(keyword) ||
nik.toLowerCase().includes(keyword)
){

let embed = linkPDF
.replace("/view","/preview")
.replace("open?id=","file/d/")
.replace("uc?id=","file/d/");

hasil = `

<h3 style="color:#00ffd5">🤰 ${nama}</h3>
<p><b>NIK:</b> ${nik}</p>

<hr>

<iframe 
src="${embed}" 
width="100%" 
height="400"
style="border:none;border-radius:10px;">
</iframe>

<a href="${linkPDF}" target="_blank">
<button style="margin-top:10px;">Download Stiker</button>
</a>

`;

break;
}
}

document.getElementById("hasilCari").innerHTML = hasil;

}

</script>

</body>
</html>
